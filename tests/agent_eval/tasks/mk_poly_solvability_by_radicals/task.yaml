    Import:
      `Mathlib.FieldTheory.AbelRuffini`

    Target shape (schematically):
      `IsSolvableByRad F α → IsSolvable (minpoly F α).Gal`

    In this mathlib version, `solvableByRad.isSolvable` takes a subtype element
    `⟨α, hα⟩ : solvableByRad F E`. Use this stable pattern:
      `intro hα`
      `have hs : IsSolvable (minpoly F (⟨α, hα⟩ : solvableByRad F E)).Gal :=`
      `  solvableByRad.isSolvable (F := F) (E := E) ⟨α, hα⟩`
      `rw [show minpoly F (⟨α, hα⟩ : solvableByRad F E) = minpoly F α from`
      `  (minpoly.algebraMap_eq (RingHom.injective _) _).symm] at hs`
      `exact hs`
