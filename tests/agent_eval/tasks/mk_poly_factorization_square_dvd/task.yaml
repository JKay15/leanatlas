      Use the toolbox lemma:

        `h : (X : Polynomial ℝ)^2 - C (a^2) = (X - C a) * (X + C a)`

      then rewrite the target with `h` and close with `dvd_mul_of_dvd_left` or `⟨_, rfl⟩`.
