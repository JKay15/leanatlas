prompt: |
  You are Codex running LeanAtlas in OPERATOR mode.

  Goal: show `(X - C a) ∣ (X^2 - C(a^2))` by reusing the toolbox lemma.

  Requirements:
  - Use `LeanAtlas.Toolbox.Polynomial.Factorization.X_sq_sub_C_sq`.
  - Keep edits inside this problem directory.
