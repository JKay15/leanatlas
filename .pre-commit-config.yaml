minimum_pre_commit_version: "4.0.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json

  - repo: local
    hooks:
      - id: regenerate-file-index
        name: regenerate FILE_INDEX.md
        entry: python tools/docs/generate_file_index.py --write
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: regenerate-test-matrix
        name: regenerate TEST_MATRIX.md
        entry: python tools/tests/generate_test_matrix.py --write
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: check-file-index-up-to-date
        name: check FILE_INDEX.md up to date
        entry: python tests/contract/check_file_index_reachability.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: check-test-matrix-up-to-date
        name: check TEST_MATRIX.md up to date
        entry: python tests/contract/check_test_matrix_up_to_date.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: commit-msg-conventional
        name: commit-msg conventional policy (LeanAtlas)
        entry: python tools/onboarding/check_commit_message.py
        language: system
        stages: [commit-msg]
        pass_filenames: true

      - id: branch-name-policy
        name: branch name policy (LeanAtlas)
        entry: python tools/onboarding/check_branch_name.py
        language: system
        stages: [pre-push]
        pass_filenames: false
